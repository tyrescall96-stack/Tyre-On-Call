kind = "web"
previewPath = "/"
title = "Tyre on Call"
version = "1.0.0"
id = "artifacts/tyre-on-call"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18997

[services.development]
run = "pnpm --filter @workspace/tyre-on-call run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tyre-on-call", "run", "build" ]
publicDir = "artifacts/tyre-on-call/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18997"
BASE_PATH = "/"
